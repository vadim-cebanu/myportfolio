<section class="portfolio" id="portfolio">
  <div class="glow glow-purple"></div>

  <div class="portfolio-container">
    <div class="portfolio-header">
      <div class="title-wrapper">
        <div class="title-line"></div>
        <h2 class="section-title">{{ 'portfolio.title' | translate }}</h2>
        <div class="title-line"></div>
      </div>

      <p class="subtitle">{{ 'portfolio.subtitle' | translate }}</p>
    </div>

    <div
      class="portfolio-carousel"
      [class.no-transition]="!transitionEnabled()"
      [style.--current-slide]="currentSlide()"
    >
      <div class="carousel-inner">
        <div class="carousel-item" *ngFor="let project of visibleItems; let i = index">
          <div class="project-card" (click)="toggleProject(i)" [class.active]="activeProject() === i">
            <div class="project-image">
              <img [src]="project.image" [alt]="project.alt" />
              <div class="project-overlay" (click)="$event.stopPropagation()" [class.open]="activeProject() === i">
                <div class="overlay-buttons">
                  <a
                    [href]="project.github"
                    target="_blank"
                    class="btn btn-secondary"
                    >{{ 'portfolio.github' | translate }}</a
                  >
                  <a
                    [href]="project.live"
                    target="_blank"
                    class="btn btn-primary"
                    >{{ 'portfolio.liveTest' | translate }}</a
                  >
                </div>
                <div class="overlay-content">
                  <h3 class="project-title">{{ project.titleKey | translate }}</h3>
                  <p class="project-description">
                    {{ project.descKey | translate }}
                  </p>
                  <div class="project-tech">
                    <ng-container *ngFor="let tech of project.tech; let j = index">
                      <span>{{ tech }}</span>
                      <span *ngIf="j < project.tech.length - 1">|</span>
                    </ng-container>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="carousel-dots">
        <button
          class="carousel-dot"
          *ngFor="let _ of projects; let i = index"
          type="button"
          (click)="goTo(i)"
          [class.active]="currentSlide() === i + 1"
          [attr.aria-label]="'Go to project ' + (i + 1)"
        ></button>
      </div>
    </div>
  </div>
</section>
