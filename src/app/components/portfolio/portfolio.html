<section class="portfolio" id="portfolio">
  <div class="glow glow-purple"></div>

  <div class="portfolio-container">
    <div class="portfolio-header">
      <div class="title-wrapper">
        <div class="title-line"></div>
        <h2 class="section-title">{{ 'portfolio.title' | translate }}</h2>
        <div class="title-line"></div>
      </div>

      <p class="subtitle">{{ 'portfolio.subtitle' | translate }}</p>
    </div>

    <div class="projects-grid">
      <div class="project-card" *ngFor="let project of projects; let i = index" [class.reverse]="i % 2 === 1">
        <div class="project-mockup">
          <img [src]="project.image" [alt]="project.alt" class="laptop-image" />
        </div>

        <div class="project-content">
          <h3 class="project-title">{{ project.titleKey | translate }}</h3>

          <div class="project-tech">
            <ng-container *ngFor="let tech of project.tech; let j = index">
              <span>{{ tech }}</span>
              <span *ngIf="j < project.tech.length - 1" class="separator">|</span>
            </ng-container>
          </div>

          <p class="project-description">
            {{ project.descKey | translate }}
          </p>

          <div class="project-buttons">
            <a [href]="project.live" target="_blank" class="btn btn-primary">
              {{ 'portfolio.liveTest' | translate }}
            </a>
            <a [href]="project.github" target="_blank" class="btn btn-secondary">
              {{ 'portfolio.github' | translate }}
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
